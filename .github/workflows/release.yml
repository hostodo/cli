name: Release

# Runs GoReleaser for tags pushed MANUALLY (e.g. a local `git push origin vX.Y.Z`
# or a hotfix tag). The normal path is the "Release (Manual)" workflow
# (release-dispatch.yml), which tags + runs GoReleaser in one job — its tag push
# uses GITHUB_TOKEN and intentionally does NOT trigger this workflow (GitHub's
# anti-recursion rule), so the two paths never double-release the same tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
